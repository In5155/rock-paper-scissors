<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors – Multiplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;600&family=DM+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, remove, push, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDL1AtmuRSsg83UYBVnrl_tZAhxId63lRM",
      authDomain: "rock-paper-scissors-88a22.firebaseapp.com",
      databaseURL: "https://rock-paper-scissors-88a22-default-rtdb.firebaseio.com",
      projectId: "rock-paper-scissors-88a22",
      storageBucket: "rock-paper-scissors-88a22.firebasestorage.app",
      messagingSenderId: "635044147900",
      appId: "1:635044147900:web:b2699141218a0478fad6b9",
      measurementId: "G-6WKVJJR893"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const emoji = { Rock: "🪨", Paper: "📄", Scissors: "✂️" };

    let myRole        = null;
    let roomCode      = null;
    let roomRef       = null;
    let unsubscribe   = null;
    let roundResolved = false;
    let myUsername    = null;
    let visitorId     = null;  // persistent ID stored in localStorage

    // ── Visitor tracking ──────────────────────────────────────────────────────
    function getOrCreateVisitorId() {
      let id = localStorage.getItem("rps_visitor_id");
      if (!id) {
        id = "v_" + Date.now() + "_" + Math.random().toString(36).substring(2, 8);
        localStorage.setItem("rps_visitor_id", id);
      }
      return id;
    }

    async function logVisit() {
      visitorId = getOrCreateVisitorId();
      const visitorRef = ref(db, `analytics/visitors/${visitorId}`);
      const snap = await get(visitorRef);
      const existing = snap.val();
      await set(visitorRef, {
        firstSeen:  existing?.firstSeen  || Date.now(),
        lastSeen:   Date.now(),
        visits:     (existing?.visits    || 0) + 1,
        username:   existing?.username   || null,
        userAgent:  navigator.userAgent.substring(0, 120),
      });
    }

    async function updateVisitorUsername(name) {
      if (!visitorId) return;
      await update(ref(db, `analytics/visitors/${visitorId}`), { username: name });
    }

    async function logMatch(p1name, p2name, p1choice, p2choice) {
      const outcome1 = getResult(p1choice, p2choice);
      await push(ref(db, "analytics/matches"), {
        timestamp:  Date.now(),
        roomCode:   roomCode,
        player1:    p1name,
        player2:    p2name,
        p1choice:   p1choice,
        p2choice:   p2choice,
        winner:     outcome1 === "win" ? p1name : outcome1 === "lose" ? p2name : "tie",
      });
    }

    // ── DOM ───────────────────────────────────────────────────────────────────
    const screens = {
      name:  document.getElementById("screen-name"),
      lobby: document.getElementById("screen-lobby"),
      wait:  document.getElementById("screen-wait"),
      game:  document.getElementById("screen-game"),
    };
    const nameInput      = document.getElementById("nameInput");
    const nameBtn        = document.getElementById("nameBtn");
    const nameGreeting   = document.getElementById("nameGreeting");
    const createBtn      = document.getElementById("createBtn");
    const joinBtn        = document.getElementById("joinBtn");
    const joinCodeIn     = document.getElementById("joinCode");
    const codeDisplay    = document.getElementById("codeDisplay");
    const waitMsg        = document.getElementById("waitMsg");
    const choiceBtns     = document.querySelectorAll(".choices button");
    const resultBox      = document.getElementById("result");
    const resultText     = document.getElementById("resultText");
    const detailEl       = document.getElementById("detail");
    const playerEmojiEl  = document.getElementById("playerEmoji");
    const oppEmojiEl     = document.getElementById("computerEmoji");
    const winsEl         = document.getElementById("wins");
    const tiesEl         = document.getElementById("ties");
    const lossesEl       = document.getElementById("losses");
    const nextRoundBtn   = document.getElementById("nextRoundBtn");
    const leaveBtn       = document.getElementById("leaveBtn");
    const leaveWaitBtn   = document.getElementById("leaveWaitBtn");
    const copyBtn        = document.getElementById("copyBtn");
    const statusDot      = document.getElementById("statusDot");
    const statusLabel    = document.getElementById("statusLabel");
    const myChoiceLabel  = document.getElementById("myChoiceLabel");
    const oppChoiceLabel = document.getElementById("oppChoiceLabel");
    const gameTitle      = document.getElementById("gameTitle");

    // ── Helpers ───────────────────────────────────────────────────────────────
    function show(name) {
      Object.values(screens).forEach(s => s.classList.add("hidden"));
      screens[name].classList.remove("hidden");
    }

    function genCode() {
      return Math.random().toString(36).substring(2, 7).toUpperCase();
    }

    function getResult(me, opp) {
      if (me === opp) return "tie";
      if (
        (me === "Rock"     && opp === "Scissors") ||
        (me === "Paper"    && opp === "Rock")     ||
        (me === "Scissors" && opp === "Paper")
      ) return "win";
      return "lose";
    }

    function oppRole() {
      return myRole === "player1" ? "player2" : "player1";
    }

    // ── Name screen ───────────────────────────────────────────────────────────
    nameBtn.addEventListener("click", enterName);
    nameInput.addEventListener("keydown", e => { if (e.key === "Enter") enterName(); });

    async function enterName() {
      const name = nameInput.value.trim();
      if (!name) return;

      // Secret admin code
      if (name.toLowerCase() === "!admin") {
        window.location.href = "admin.html";
        return;
      }

      myUsername = name;
      await updateVisitorUsername(name);
      nameGreeting.textContent = `Welcome, ${name}!`;
      show("lobby");
    }

    // ── Create Room ───────────────────────────────────────────────────────────
    createBtn.addEventListener("click", async () => {
      roomCode = genCode();
      myRole   = "player1";
      roomRef  = ref(db, `rooms/${roomCode}`);

      await set(roomRef, {
        player1: { score: { wins: 0, ties: 0, losses: 0 }, choice: null, name: myUsername },
        player2: null,
        status: "waiting"
      });

      codeDisplay.textContent = roomCode;
      show("wait");
      waitMsg.textContent = "Share the code above — waiting for opponent…";
      listenRoom();
    });

    // ── Join Room ─────────────────────────────────────────────────────────────
    joinBtn.addEventListener("click", async () => {
      const code = joinCodeIn.value.trim().toUpperCase();
      if (!code) return;

      const snap = await new Promise(res => {
        onValue(ref(db, `rooms/${code}`), res, { onlyOnce: true });
      });

      const data = snap.val();
      if (!data)        return alert("Room not found. Check the code and try again.");
      if (data.player2) return alert("Room is already full.");

      roomCode = code;
      myRole   = "player2";
      roomRef  = ref(db, `rooms/${roomCode}`);

      await update(roomRef, {
        "player2": { score: { wins: 0, ties: 0, losses: 0 }, choice: null, name: myUsername },
        "status": "playing"
      });

      show("game");
      listenRoom();
    });

    // ── Copy code ─────────────────────────────────────────────────────────────
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(roomCode).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => copyBtn.textContent = "Copy Code", 1500);
      });
    });

    // ── Listen to room ────────────────────────────────────────────────────────
    function listenRoom() {
      unsubscribe = onValue(roomRef, (snap) => {
        const data = snap.val();
        if (!data) return;

        if (myRole === "player1" && data.status === "playing" && !screens.wait.classList.contains("hidden")) {
          show("game");
          const oppName = data.player2?.name || "Opponent";
          gameTitle.textContent = `vs ${oppName}`;
        }

        if (data.status === "playing" && !data[oppRole()]) {
          alert("Opponent left the game.");
          leaveRoom();
          return;
        }

        if (screens.game && !screens.game.classList.contains("hidden")) {
          const oppName = data[oppRole()]?.name || "Opponent";
          gameTitle.textContent = `vs ${oppName}`;
        }

        const oppPresent        = !!data[oppRole()];
        statusDot.className     = "dot " + (oppPresent ? "green" : "red");
        statusLabel.textContent = oppPresent
          ? `${data[oppRole()]?.name || "Opponent"} connected`
          : "Waiting for opponent…";

        const myChoice  = data[myRole]?.choice  || null;
        const oppChoice = data[oppRole()]?.choice || null;

        if (myChoice && oppChoice && !roundResolved) {
          roundResolved = true;
          resolveRound(data, myChoice, oppChoice);
          return;
        }

        if (myChoice && !oppChoice && !roundResolved) {
          myChoiceLabel.textContent  = `You chose ${emoji[myChoice]}`;
          oppChoiceLabel.textContent = `${data[oppRole()]?.name || "Opponent"} is thinking…`;
          return;
        }

        if (!myChoice && !oppChoice && roundResolved) {
          roundResolved = false;
          resultBox.classList.add("hidden");
          nextRoundBtn.classList.add("hidden");
          nextRoundBtn.disabled    = false;
          nextRoundBtn.textContent = "Next Round";
          choiceBtns.forEach(b => b.disabled = false);
          myChoiceLabel.textContent  = "";
          oppChoiceLabel.textContent = "";
        }

        const sc = data[myRole]?.score;
        if (sc) {
          winsEl.textContent   = sc.wins;
          tiesEl.textContent   = sc.ties;
          lossesEl.textContent = sc.losses;
        }
      });
    }

    // ── Make a choice ─────────────────────────────────────────────────────────
    choiceBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        if (!roomCode || roundResolved) return;
        update(ref(db, `rooms/${roomCode}/${myRole}`), { choice: btn.dataset.choice });
        choiceBtns.forEach(b => b.disabled = true);
      });
    });

    // ── Resolve round ─────────────────────────────────────────────────────────
    async function resolveRound(data, myChoice, oppChoice) {
      if (myRole === "player1") {
        const r1 = getResult(myChoice, oppChoice);
        const r2 = getResult(oppChoice, myChoice);
        const s1 = data.player1.score;
        const s2 = data.player2.score;

        await update(ref(db, `rooms/${roomCode}/player1/score`), {
          wins:   s1.wins   + (r1 === "win"  ? 1 : 0),
          ties:   s1.ties   + (r1 === "tie"  ? 1 : 0),
          losses: s1.losses + (r1 === "lose" ? 1 : 0),
        });
        await update(ref(db, `rooms/${roomCode}/player2/score`), {
          wins:   s2.wins   + (r2 === "win"  ? 1 : 0),
          ties:   s2.ties   + (r2 === "tie"  ? 1 : 0),
          losses: s2.losses + (r2 === "lose" ? 1 : 0),
        });

        // ── Log the match to analytics ──────────────────────────────────
        await logMatch(
          data.player1.name || "Player 1",
          data.player2.name || "Player 2",
          myChoice,
          oppChoice
        );
      }

      showResult(data, myChoice, oppChoice);
    }

    function showResult(data, myChoice, oppChoice) {
      const outcome = getResult(myChoice, oppChoice);
      const oppName = data[oppRole()]?.name || "Opponent";

      playerEmojiEl.textContent = emoji[myChoice];
      oppEmojiEl.textContent    = emoji[oppChoice];

      document.getElementById("vsP1Label").textContent = myUsername || "You";
      document.getElementById("vsP2Label").textContent = oppName;

      resultText.textContent =
        outcome === "win"  ? "You Win! 🎉" :
        outcome === "lose" ? "You Lose! 😞" : "It's a Tie! 🤝";

      resultText.style.color =
        outcome === "win"  ? "#3e8f5a" :
        outcome === "lose" ? "#a94442" : "#b89b2e";

      detailEl.textContent = `${myChoice} vs ${oppChoice}`;

      resultBox.classList.remove("hidden");
      nextRoundBtn.classList.remove("hidden");
      choiceBtns.forEach(b => b.disabled = true);
      myChoiceLabel.textContent  = "";
      oppChoiceLabel.textContent = "";
    }

    // ── Next round ────────────────────────────────────────────────────────────
    nextRoundBtn.addEventListener("click", async () => {
      nextRoundBtn.disabled    = true;
      nextRoundBtn.textContent = "Waiting for opponent…";
      await update(ref(db, `rooms/${roomCode}/${myRole}`), { choice: null });
    });

    // ── Leave ─────────────────────────────────────────────────────────────────
    leaveBtn.addEventListener("click", leaveRoom);
    leaveWaitBtn.addEventListener("click", leaveRoom);

    async function leaveRoom() {
      if (unsubscribe) unsubscribe();
      if (roomRef && myRole === "player1") {
        await remove(roomRef);
      } else if (roomRef) {
        await update(ref(db, `rooms/${roomCode}`), { player2: null, status: "waiting" });
      }
      roomCode = roomRef = myRole = null;
      roundResolved = false;
      choiceBtns.forEach(b => b.disabled = false);
      nextRoundBtn.disabled    = false;
      nextRoundBtn.textContent = "Next Round";
      resultBox.classList.add("hidden");
      nextRoundBtn.classList.add("hidden");
      joinCodeIn.value = "";
      winsEl.textContent = tiesEl.textContent = lossesEl.textContent = "0";
      gameTitle.textContent = "";
      show("lobby");
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    logVisit();
    show("name");
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #f6f1e9;
      --paper-dark: #eee7db;
      --ink: #1f1d1a;
      --ink-mid: #5f5a52;
      --ink-light: #a09a92;
      --rule: #d8d1c4;
      --accent: #b23a2f;
      --mono: 'DM Mono', monospace;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: #e7e1d6;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 26px,
        rgba(0,0,0,0.035) 26px, rgba(0,0,0,0.035) 27px);
      font-family: var(--sans);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .app {
      width: 420px;
      background: var(--paper);
      border-radius: 3px;
      box-shadow: -4px 0 0 #bdb4a5, 0 3px 6px rgba(0,0,0,0.12), 0 16px 40px rgba(0,0,0,0.15);
      padding: 28px 26px 30px 58px;
      position: relative;
      animation: appear 0.45s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(14px) rotate(-0.25deg); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 44px;
      width: 1px;
      background: rgba(178,58,47,0.28);
    }

    h1 {
      font-family: var(--serif);
      font-size: 1.85rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 22px;
    }

    .game-vs {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 14px;
      min-height: 16px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 16px;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--ink-mid);
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #3e8f5a; }
    .dot.red   { background: #a94442; }
    .dot.gray  { background: var(--ink-light); }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 14px;
      margin-bottom: 22px;
    }

    .scoreboard > div { text-align: center; }
    .score { font-family: var(--mono); font-size: 1.3rem; font-weight: 600; }
    .green  { color: #3e8f5a; }
    .yellow { color: #b89b2e; }
    .red    { color: #a94442; }

    .score-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    .choices {
      display: flex;
      justify-content: space-between;
      margin: 24px 0 10px;
    }

    .choices button {
      width: 88px;
      padding: 14px 10px 12px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      border-radius: 3px;
      cursor: pointer;
      font-size: 1.8rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
    }

    .choices button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.12); }
    .choices button:active:not(:disabled) { transform: translateY(0); box-shadow: inset 0 2px 4px rgba(0,0,0,0.18); }
    .choices button:disabled { opacity: 0.45; cursor: not-allowed; }

    .choices button span {
      display: block;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    .choice-hints {
      display: flex;
      justify-content: space-between;
      min-height: 18px;
      margin-bottom: 16px;
    }

    .choice-hint {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      font-style: italic;
    }

    .result {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--rule);
    }

    .vs { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px; }
    .vs > div { text-align: center; }

    .vs-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 4px;
    }

    .emoji { font-size: 2.6rem; }

    .vs-text {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--ink-light);
    }

    .result-text {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }

    .detail {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      text-align: center;
    }

    .btn-row { display: flex; gap: 8px; margin-top: 22px; }

    .btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-dark { background: var(--ink); color: var(--paper); }
    .btn-dark:hover:not(:disabled) { background: #2b2925; }
    .btn-outline { background: transparent; color: var(--ink-mid); border: 1px solid var(--rule); }
    .btn-outline:hover { background: var(--paper-dark); }

    /* Name screen */
    .name-prompt {
      font-family: var(--serif);
      font-size: 1.1rem;
      margin-bottom: 14px;
      color: var(--ink-mid);
    }

    .name-row { display: flex; gap: 8px; }

    .name-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      border-radius: 2px;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
    }

    .name-input:focus { border-color: var(--ink-mid); }

    .lobby-section { margin-bottom: 20px; }

    .lobby-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 8px;
    }

    .room-input-row { display: flex; gap: 8px; }

    .room-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      outline: none;
    }

    .room-input:focus { border-color: var(--ink-mid); }

    .code-box {
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 18px;
      text-align: center;
      margin-bottom: 18px;
    }

    .code-big {
      font-family: var(--mono);
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--ink);
    }

    .code-sub {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 6px;
    }

    .wait-msg {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--ink-mid);
      text-align: center;
      margin-bottom: 18px;
    }

    .divider { border: none; border-top: 1px solid var(--rule); margin: 20px 0; }
    .hidden  { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Rock Paper Scissors</h1>
    <div class="subtitle" id="nameGreeting">Multiplayer</div>

    <!-- NAME -->
    <div id="screen-name">
      <p class="name-prompt">What's your name?</p>
      <div class="name-row">
        <input id="nameInput" class="name-input" maxlength="20" placeholder="Enter your name…" />
        <button id="nameBtn" class="btn btn-dark" style="flex:0 0 auto;padding:10px 16px">Play →</button>
      </div>
    </div>

    <!-- LOBBY -->
    <div id="screen-lobby" class="hidden">
      <div class="lobby-section">
        <div class="lobby-label">Create a new room</div>
        <button id="createBtn" class="btn btn-dark" style="width:100%">Create Room</button>
      </div>
      <hr class="divider">
      <div class="lobby-section">
        <div class="lobby-label">Join existing room</div>
        <div class="room-input-row">
          <input id="joinCode" class="room-input" maxlength="5" placeholder="ENTER CODE" />
          <button id="joinBtn" class="btn btn-dark" style="flex:0 0 auto;padding:10px 16px">Join</button>
        </div>
      </div>
    </div>

    <!-- WAITING -->
    <div id="screen-wait" class="hidden">
      <div class="code-box">
        <div class="code-big" id="codeDisplay">——</div>
        <div class="code-sub">Share this code with your opponent</div>
      </div>
      <div class="wait-msg" id="waitMsg">Waiting for opponent…</div>
      <button id="copyBtn" class="btn btn-outline" style="width:100%">Copy Code</button>
      <hr class="divider">
      <button id="leaveWaitBtn" class="btn btn-outline" style="width:100%">Cancel</button>
    </div>

    <!-- GAME -->
    <div id="screen-game" class="hidden">
      <div class="game-vs" id="gameTitle"></div>
      <div class="status-bar">
        <div class="dot gray" id="statusDot"></div>
        <span id="statusLabel">Connecting…</span>
      </div>

      <div class="scoreboard">
        <div>
          <div id="wins" class="score green">0</div>
          <div class="score-label">Wins</div>
        </div>
        <div>
          <div id="ties" class="score yellow">0</div>
          <div class="score-label">Ties</div>
        </div>
        <div>
          <div id="losses" class="score red">0</div>
          <div class="score-label">Losses</div>
        </div>
      </div>

      <div class="choices">
        <button data-choice="Rock">🪨<span>Rock</span></button>
        <button data-choice="Paper">📄<span>Paper</span></button>
        <button data-choice="Scissors">✂️<span>Scissors</span></button>
      </div>

      <div class="choice-hints">
        <div class="choice-hint" id="myChoiceLabel"></div>
        <div class="choice-hint" id="oppChoiceLabel"></div>
      </div>

      <div id="result" class="result hidden">
        <div class="vs">
          <div>
            <div id="playerEmoji" class="emoji"></div>
            <div class="vs-label" id="vsP1Label">You</div>
          </div>
          <div class="vs-text">vs</div>
          <div>
            <div id="computerEmoji" class="emoji"></div>
            <div class="vs-label" id="vsP2Label">Opponent</div>
          </div>
        </div>
        <div id="resultText" class="result-text"></div>
        <div id="detail" class="detail"></div>
      </div>

      <div class="btn-row">
        <button id="nextRoundBtn" class="btn btn-dark hidden">Next Round</button>
        <button id="leaveBtn" class="btn btn-outline">Leave</button>
      </div>
    </div>
  </div>
</body>
</html>
